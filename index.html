<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Istilah Bahasa Arab</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>Istilah Bahasa Arab</h1>
        <p>Sistem carian dan panel pengurusan data Bahasa Arab (nahu/sorof)</p>
    </header>

    <nav class="nav-tabs">
        <button class="nav-btn active" id="tabCarian" data-target="sectionCarian">Halaman Carian</button>
        <button class="nav-btn" id="tabAdmin" data-target="sectionAdmin">Panel Admin</button>
    </nav>

    <main>
        <section id="sectionCarian" class="view-section active">
            <div class="search-wrapper">
                <div class="search-box">
                    <input type="search" id="searchInput" class="form-control" autocomplete="off" placeholder="Taip untuk mencari istilah (cth: madhi, fail)...">
                </div>
                <div class="suggestions-list" id="suggestionsList"></div>
            </div>

            <div id="alphabeticalDirectory"></div>

            <div id="resultsList"></div>
        </section>

        <section id="sectionAdmin" class="view-section">
            <div id="adminAuthBox" style="background: var(--card-bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border-color); max-width: 400px; margin: 0 auto;">
                <h3 style="margin-bottom: 12px; color: var(--primary-color);">Log Masuk Pentadbir</h3>
                <form id="loginForm">
                    <div class="form-group">
                        <label>E-mel Admin</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="admin@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Kata Laluan</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="******" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">Log Masuk</button>
                </form>
            </div>

            <div id="adminDashboardBox" style="display: none;">
                <div class="admin-top-bar">
                    <div>
                        <h3>Pangkalan Data Supabase SQL</h3>
                        <button id="btnLogKeluar" class="btn btn-secondary" style="padding: 4px 8px; font-size: 0.75rem; margin-top: 4px;">Log Keluar</button>
                    </div>
                    <button class="btn btn-primary" id="btnBukaBorang">+ Tambah Istilah</button>
                </div>

                <div class="form-section" id="formSection">
                    <h2 id="formTitle">Tambah Istilah Baru</h2>
                    <form id="termForm">
                        <input type="hidden" id="termId">
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="titleMs">Nama Istilah (Melayu)</label>
                                <input type="text" id="titleMs" class="form-control" placeholder="Contoh: Fi'il Madhi" required>
                            </div>
                            <div class="form-group">
                                <label for="titleAr">Nama Istilah (Arab)</label>
                                <input type="text" id="titleAr" class="form-control arabic-input" placeholder="فِعْل مَاضِي" required>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="category">Kategori Utama (Pilihan)</label>
                                <select id="category" class="form-control">
                                    <option value="">-- Tiada Kategori / Biarkan Kosong --</option>
                                    <option value="Fi'il">Fi'il (Kata Kerja)</option>
                                    <option value="Isim">Isim (Kata Nama)</option>
                                    <option value="Harf">Harf (Huruf/Kata Tugas)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="keywords">Kata Kunci (Asingkan dengan koma)</label>
                                <input type="text" id="keywords" class="form-control" placeholder="cth: madhi, lepas, pelaku">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="definition">Definisi / Penerangan</label>
                            <div class="text-toolbar">
                                <button type="button" class="toolbar-btn" onclick="applyFormat('definition', 'b')">B</button>
                                <button type="button" class="toolbar-btn" onclick="applyFormat('definition', 'u')"><u>U</u></button>
                                <button type="button" class="toolbar-btn" onclick="applyFormat('definition', 'i')"><i>I</i></button>
                                <button type="button" class="toolbar-btn" onclick="applyFormat('definition', 'bullet')">• Senarai</button>
                                <div class="color-picker-wrapper"><input type="color" class="toolbar-color" onchange="applyFormat('definition', 'color', this.value)"></div>
                            </div>
                            <textarea id="definition" class="form-control" rows="3" placeholder="Masukkan maksud istilah..." required></textarea>
                        </div>

                        <div class="form-group table-builder-box">
                            <div id="ciriSectionsContainer"></div>
                            <button type="button" class="btn btn-primary" id="btnTambahCiri" style="padding: 6px 12px; font-size: 0.8rem; margin-top: 8px;">+ Tambah Ciri-Ciri Utama</button>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" id="btnBatal">Batal</button>
                            <button type="submit" class="btn btn-success">Simpan Data ke SQL</button>
                        </div>
                    </form>
                </div>

                <div style="margin-top: 32px; margin-bottom: 16px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px;">
                    <h3 style="color: var(--primary-color); margin: 0;">Senarai Istilah Pangkalan Data</h3>
                    <input type="text" id="adminSearchInput" class="form-control" style="max-width: 350px;" placeholder="🔍 Cari nama istilah, kategori, dll...">
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Istilah (MS)</th>
                                <th style="text-align: right;">Istilah (AR)</th>
                                <th>Kategori</th>
                                <th>Tindakan</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<button type="button" class="floating-search-btn" id="btnFloatingSearch" title="Kembali ke Carian">🔍</button>

<script src="script.js"></script>
</body>
</html>
